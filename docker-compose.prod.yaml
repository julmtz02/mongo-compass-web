services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - compass

  compass:
    build: .
    restart: unless-stopped
    environment:
      - CW_HOST=0.0.0.0
      - CW_MASTER_PASSWORD=${CW_MASTER_PASSWORD:?Set CW_MASTER_PASSWORD}
      - CW_ENABLE_EDIT_CONNECTIONS=true
      - CW_DB_PATH=/app/data/compass-web.db
    expose:
      - "8080"
    volumes:
      - compass_data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  compass_data:
  caddy_data:
  caddy_config:
