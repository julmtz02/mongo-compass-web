services:
  compass:
    build: .
    restart: unless-stopped
    environment:
      - CW_HOST=0.0.0.0
      - CW_MASTER_PASSWORD=${CW_MASTER_PASSWORD:-changeme}
      - CW_ENABLE_EDIT_CONNECTIONS=true
      - CW_DB_PATH=/app/data/compass-web.db
    expose:
      - "8080"
    volumes:
      - compass_data:/app/data
    networks:
      - default
      - easypanel
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  compass_data:

networks:
  easypanel:
    external: true
